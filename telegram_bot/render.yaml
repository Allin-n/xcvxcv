services:
  - type: web
    name: telegram-c2-bot
    runtime: node
    repo: https://github.com/yourusername/telegram-c2-bot
    plan: free
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///database/bot.db
      - key: LOG_LEVEL
        value: INFO
      - key: PORT
        value: 5000
    buildCommand: npm install && pip install -r requirements.txt
    startCommand: npm start